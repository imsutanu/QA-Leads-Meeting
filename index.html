<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Leads — Weekly Meeting Tracker</title>
<style>
:root {
  --bg:       #f0f4f8;
  --surface:  #ffffff;
  --border:   #e4e9f0;
  --border2:  #d0d9e6;

  --sb-bg:    #0f1629;
  --sb-surf:  #1a2540;
  --sb-hover: rgba(255,255,255,.06);
  --sb-active:#1e3a6e;
  --sb-text:  #8da0bc;
  --sb-head:  #e2eaf6;

  --blue:     #2563eb;
  --blue-lt:  #dbeafe;
  --blue-dk:  #1d4ed8;
  --indigo:   #4f46e5;

  --tx:       #0f1629;
  --tx2:      #4b5a72;
  --tx3:      #8da0bc;

  --green:    #059669;  --green-lt: #d1fae5;
  --amber:    #d97706;  --amber-lt: #fef3c7;
  --red:      #dc2626;  --red-lt:   #fee2e2;
  --violet:   #7c3aed;  --violet-lt:#ede9fe;
  --sky:      #0284c7;  --sky-lt:   #e0f2fe;

  --sh1: 0 1px 3px rgba(15,22,41,.07),0 1px 2px rgba(15,22,41,.05);
  --sh2: 0 4px 12px rgba(15,22,41,.08),0 2px 4px rgba(15,22,41,.05);
  --sh3: 0 8px 24px rgba(15,22,41,.12),0 4px 8px rgba(15,22,41,.06);
  --sh4: 0 20px 48px rgba(15,22,41,.16),0 8px 16px rgba(15,22,41,.08);
  --r:   10px;
  --r2:  14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',Roboto,sans-serif;background:var(--bg);color:var(--tx);display:flex;flex-direction:column;font-size:14px;line-height:1.5;height:100vh;max-height:100vh;overflow:hidden;margin:0;padding:0;}
#root{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:rgba(0,0,0,.06);border-radius:10px;}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.35);border-radius:10px;}
::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.55);}
* { scrollbar-width: thin; scrollbar-color: rgba(0,0,0,.35) rgba(0,0,0,.06); }

/* ══ HEADER ══════════════════════════════════════════════════ */
header{
  height:58px;flex-shrink:0;
  background:linear-gradient(135deg,#1a2e6e 0%,#2563eb 100%);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px 0 0;
  box-shadow:0 2px 12px rgba(15,22,41,.3);
  position:relative;z-index:10;
}
.hdr-brand{display:flex;align-items:center;gap:0;height:100%;}
.hdr-brand-icon{
  width:58px;height:58px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.12);flex-shrink:0;
  border-right:1px solid rgba(255,255,255,.1);
}
.hdr-brand-icon svg{width:26px;height:26px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.hdr-title{padding-left:16px;}
.hdr-title h1{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.02em;}
.hdr-title p{font-size:11px;color:rgba(255,255,255,.6);margin-top:1px;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.hbtn{
  display:flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:8px;border:none;cursor:pointer;
  font-size:12px;font-weight:600;letter-spacing:.01em;
  transition:all .15s;
}
.hbtn svg{width:14px;height:14px;flex-shrink:0;}
.hbtn-ghost{background:rgba(255,255,255,.12);color:rgba(255,255,255,.9);border:1px solid rgba(255,255,255,.2);}
.hbtn-ghost:hover{background:rgba(255,255,255,.22);}
.hbtn-solid{background:#fff;color:#1d4ed8;}
.hbtn-solid:hover{background:#eff6ff;}

/* ══ LAYOUT ══════════════════════════════════════════════════ */
.layout{display:flex;flex:1;overflow:hidden;min-height:0;height:0;}

/* ══ SIDEBAR ═════════════════════════════════════════════════ */
.sidebar{width:268px;background:var(--sb-bg);display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid rgba(255,255,255,.05);min-height:0;overflow:hidden;height:100%;}
.sb-hdr{padding:16px 14px 10px;border-bottom:1px solid rgba(255,255,255,.06);}
.sb-section-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sb-text);margin-bottom:10px;}
.sb-new{
  width:100%;padding:9px 12px;
  background:rgba(37,99,235,.25);color:#93c5fd;
  border:1.5px dashed rgba(37,99,235,.5);
  border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:all .15s;
}
.sb-new:hover{background:rgba(37,99,235,.35);border-color:#3b82f6;color:#bfdbfe;}
.sb-new svg{width:14px;height:14px;}

.sb-list{flex:1;overflow-y:auto;padding:8px;scrollbar-color:rgba(255,255,255,.3) rgba(255,255,255,.06);}
.sb-item{
  padding:10px 12px;border-radius:9px;cursor:pointer;
  margin-bottom:3px;border:1px solid transparent;
  transition:background .12s;position:relative;
  border-left:3px solid transparent;
}
.sb-item:hover{background:var(--sb-hover);}
.sb-item.active{
  background:var(--sb-active);
  border-left-color:#3b82f6;
  border-color:rgba(59,130,246,.2);
}
.sb-item-date{font-size:10px;color:var(--sb-text);margin-bottom:2px;font-weight:500;}
.sb-item-title{font-size:13px;font-weight:600;color:var(--sb-head);margin-bottom:6px;}
.sb-item-foot{display:flex;align-items:center;justify-content:space-between;}
.sb-chips{display:flex;gap:4px;flex-wrap:wrap;}
.sb-chip{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;}
.sc-t{background:rgba(124,58,237,.25);color:#c4b5fd;}
.sc-o{background:rgba(217,119,6,.2);color:#fcd34d;}
.sc-d{background:rgba(5,150,105,.2);color:#6ee7b7;}
.sc-r{background:rgba(220,38,38,.25);color:#fca5a5;}
.sb-prog{width:48px;height:4px;background:rgba(255,255,255,.1);border-radius:10px;overflow:hidden;}
.sb-prog-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#06b6d4);border-radius:10px;transition:width .3s;}

.sb-footer{padding:12px 14px;border-top:1px solid rgba(255,255,255,.06);}
.sb-footer p{font-size:10px;color:var(--sb-text);text-align:center;}

/* ══ MAIN ════════════════════════════════════════════════════ */
.main{flex:1;overflow-y:scroll;padding:26px 28px;min-height:0;height:100%;}

/* ══ PAGE HEADER ════════════════════════════════════════════ */
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:16px;}
.page-hdr-left h2{font-size:22px;font-weight:700;color:var(--tx);letter-spacing:-.02em;margin-bottom:3px;}
.page-hdr-left p{font-size:13px;color:var(--tx2);}
.page-hdr-right{display:flex;gap:8px;align-items:center;flex-shrink:0;}

/* ══ STAT CARDS ═════════════════════════════════════════════ */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.stat{
  background:var(--surface);border-radius:var(--r2);
  border:1px solid var(--border);box-shadow:var(--sh1);
  padding:18px 20px;position:relative;overflow:hidden;
}
.stat::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
}
.stat-blue::before{background:linear-gradient(90deg,#2563eb,#60a5fa);}
.stat-amber::before{background:linear-gradient(90deg,#d97706,#fcd34d);}
.stat-indigo::before{background:linear-gradient(90deg,#4f46e5,#a78bfa);}
.stat-red::before{background:linear-gradient(90deg,#dc2626,#f87171);}
.stat-icon{
  width:36px;height:36px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:12px;
}
.stat-icon svg{width:18px;height:18px;}
.si-blue{background:#eff6ff;color:#2563eb;}
.si-amber{background:#fef3c7;color:#d97706;}
.si-indigo{background:#ede9fe;color:#7c3aed;}
.si-red{background:#fee2e2;color:#dc2626;}
.stat-val{font-size:30px;font-weight:800;color:var(--tx);letter-spacing:-.03em;line-height:1;}
.stat-lbl{font-size:12px;font-weight:500;color:var(--tx2);margin-top:5px;}

/* ══ CARDS ═══════════════════════════════════════════════════ */
.card{background:var(--surface);border-radius:var(--r2);border:1px solid var(--border);box-shadow:var(--sh1);margin-bottom:18px;overflow:hidden;}
.card-hdr{
  padding:15px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.card-hdr-left{display:flex;align-items:center;gap:10px;}
.card-hdr-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;}
.card-hdr-icon svg{width:15px;height:15px;}
.chi-blue{background:#eff6ff;color:#2563eb;}
.chi-red{background:#fee2e2;color:#dc2626;}
.chi-green{background:#d1fae5;color:#059669;}
.card-hdr h3{font-size:14px;font-weight:600;color:var(--tx);}
.card-body{padding:20px;}

/* ══ MEETING HERO ════════════════════════════════════════════ */
.mtg-hero{
  background:var(--surface);border-radius:var(--r2);
  border:1px solid var(--border);box-shadow:var(--sh1);
  padding:22px 24px;margin-bottom:18px;
}
.mtg-hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px;}
.mtg-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--blue-lt);color:var(--blue);
  font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  padding:3px 10px;border-radius:20px;margin-bottom:8px;
}
.mtg-badge svg{width:10px;height:10px;}
.mtg-title{font-size:20px;font-weight:800;color:var(--tx);letter-spacing:-.02em;margin-bottom:4px;}
.mtg-meta{font-size:13px;color:var(--tx2);display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.mtg-meta-dot{width:4px;height:4px;border-radius:50%;background:var(--border2);flex-shrink:0;}
.mtg-hero-actions{display:flex;flex-direction:column;gap:8px;align-items:flex-end;flex-shrink:0;}

/* Progress bar in hero */
.progress-wrap{margin-top:16px;padding-top:16px;border-top:1px solid var(--border);}
.progress-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.progress-label{font-size:12px;font-weight:600;color:var(--tx2);}
.progress-pct{font-size:12px;font-weight:700;color:var(--tx);}
.progress-bar{height:6px;background:#e9f0fa;border-radius:10px;overflow:hidden;}
.progress-fill{height:100%;border-radius:10px;transition:width .4s ease;background:linear-gradient(90deg,#2563eb,#06b6d4);}
.progress-fill.done{background:linear-gradient(90deg,#059669,#10b981);}

/* ══ ATTENDEES ═══════════════════════════════════════════════ */
.att-section{margin-top:16px;padding-top:16px;border-top:1px solid var(--border);}
.att-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--tx3);margin-bottom:8px;}
.att-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.att-chip{
  display:inline-flex;align-items:center;gap:5px;
  background:#f0f4ff;color:#3346a0;
  padding:5px 10px 5px 12px;border-radius:20px;
  font-size:12px;font-weight:500;border:1px solid #d6deff;
}
.att-rm{
  width:16px;height:16px;border-radius:50%;background:rgba(51,70,160,.15);
  color:#3346a0;font-size:13px;line-height:16px;text-align:center;
  cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
}
.att-rm:hover{background:#3346a0;color:#fff;}
.att-input-wrap{display:flex;gap:6px;align-items:center;}
.att-input-wrap input{
  height:32px;padding:0 10px;
  border:1px solid var(--border2);border-radius:8px;
  font-size:12px;font-family:inherit;color:var(--tx);
  background:var(--bg);outline:none;width:140px;
}
.att-input-wrap input:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.att-add-btn{
  height:32px;padding:0 12px;border-radius:8px;
  background:var(--blue);color:#fff;border:none;
  font-size:12px;font-weight:600;cursor:pointer;
}
.att-add-btn:hover{background:var(--blue-dk);}

/* ══ TABS ════════════════════════════════════════════════════ */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:18px;}
.tab{
  padding:10px 20px;font-size:13px;font-weight:500;
  color:var(--tx2);cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-2px;
  display:flex;align-items:center;gap:6px;white-space:nowrap;
  transition:color .15s;
}
.tab svg{width:14px;height:14px;opacity:.7;}
.tab:hover:not(.active){color:var(--tx);}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);}
.tab.active svg{opacity:1;}
.tab-count{
  background:#e9f0fa;color:var(--blue);
  font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;
}
.tab.active .tab-count{background:var(--blue);color:#fff;}

/* ══ TABLES ══════════════════════════════════════════════════ */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead tr{background:#f7f9fc;}
th{
  padding:10px 14px;text-align:left;
  font-size:10px;font-weight:700;color:var(--tx3);
  text-transform:uppercase;letter-spacing:.06em;
  border-bottom:2px solid var(--border);white-space:nowrap;
}
td{padding:11px 14px;border-bottom:1px solid #f0f4f8;color:var(--tx2);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr{transition:background .1s;}
tbody tr:hover td{background:#fafbfd;}
.td-main{font-weight:500;color:var(--tx)!important;}

/* ══ BADGES ══════════════════════════════════════════════════ */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap;}
.badge svg{width:8px;height:8px;}
.badge-dot{width:6px;height:6px;border-radius:50%;display:inline-block;}
.p-high{background:#fee2e2;color:#b91c1c;}
.p-medium{background:#fef9c3;color:#854d0e;}
.p-low{background:#dcfce7;color:#166534;}
.s-open{background:#fef3c7;color:#92400e;}
.s-inprogress{background:#dbeafe;color:#1e40af;}
.s-done{background:#d1fae5;color:#065f46;}

/* ══ BUTTONS ═════════════════════════════════════════════════ */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:8px;border:none;cursor:pointer;
  font-size:13px;font-weight:600;font-family:inherit;
  transition:all .15s;letter-spacing:.01em;
}
.btn svg{width:14px;height:14px;flex-shrink:0;}
.btn:active{transform:scale(.98);}
.btn-primary{background:var(--blue);color:#fff;}
.btn-primary:hover{background:var(--blue-dk);}
.btn-secondary{background:#f0f4f8;color:var(--tx2);border:1px solid var(--border2);}
.btn-secondary:hover{background:var(--border);}
.btn-ghost-red{background:transparent;color:var(--red);border:1px solid #fecaca;}
.btn-ghost-red:hover{background:#fee2e2;}
.btn-success{background:var(--green);color:#fff;}
.btn-success:hover{background:#047857;}
.ibtn{
  width:30px;height:30px;border:none;background:transparent;cursor:pointer;
  border-radius:7px;font-size:13px;color:var(--tx3);
  display:inline-flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.ibtn:hover{background:#f0f4f8;color:var(--tx);}
.ibtn.del:hover{background:#fee2e2;color:var(--red);}
.ibtn svg{width:14px;height:14px;}

/* ══ TOPICS ══════════════════════════════════════════════════ */
.topic-card{
  border:1px solid var(--border);border-radius:var(--r);
  margin-bottom:10px;overflow:hidden;background:var(--surface);
  box-shadow:var(--sh1);transition:box-shadow .15s;
}
.topic-card:hover{box-shadow:var(--sh2);}
.topic-hdr{
  padding:13px 16px;display:flex;align-items:center;gap:12px;
  cursor:pointer;background:#fcfdff;border-bottom:1px solid transparent;
}
.topic-hdr.open-state{border-bottom-color:var(--border);}
.topic-num{
  width:26px;height:26px;border-radius:7px;
  background:var(--blue-lt);color:var(--blue);
  font-size:11px;font-weight:800;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.topic-name{font-size:14px;font-weight:600;color:var(--tx);flex:1;}
.topic-btns{display:flex;gap:2px;align-items:center;}
.topic-chevron{
  width:20px;height:20px;border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  color:var(--tx3);transition:transform .2s,background .15s;flex-shrink:0;
}
.topic-chevron.open{transform:rotate(90deg);}
.topic-chevron svg{width:14px;height:14px;}
.topic-body{padding:14px 16px;background:#fff;}
.topic-notes{font-size:13px;color:var(--tx2);line-height:1.75;}
.topic-notes table{border-collapse:collapse;width:100%;margin:8px 0;font-size:13px;}
.topic-notes table td,.topic-notes table th{border:1px solid var(--border2);padding:6px 10px;text-align:left;vertical-align:top;}
.topic-notes table th{background:#f0f4f8;font-weight:600;}
.topic-notes table tr:nth-child(even){background:#f8fafc;}
.topic-notes p{margin-bottom:6px;}
.topic-notes ul,.topic-notes ol{padding-left:20px;margin-bottom:6px;}
/* Rich text editor (contenteditable) */
.rich-editor{
  min-height:100px;border:1.5px solid var(--border2);border-radius:8px;
  padding:10px 12px;font-size:14px;font-family:inherit;line-height:1.65;
  outline:none;background:#fff;overflow-y:auto;max-height:280px;color:var(--tx);
}
.rich-editor:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.rich-editor:empty::before{content:attr(data-placeholder);color:#b0bcc9;pointer-events:none;}
.rich-editor table{border-collapse:collapse;width:100%;margin:6px 0;font-size:13px;}
.rich-editor table td,.rich-editor table th{border:1px solid var(--border2);padding:5px 9px;text-align:left;vertical-align:top;}
.rich-editor table th{background:#f0f4f8;font-weight:600;}
.rich-editor table tr:nth-child(even){background:#f8fafc;}
.rich-editor p{margin-bottom:4px;}
.rich-editor ul,.rich-editor ol{padding-left:20px;}
.topic-empty{font-size:13px;color:var(--tx3);font-style:italic;}

/* ══ FILTER BAR ══════════════════════════════════════════════ */
.filter-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.fsel{
  height:34px;padding:0 12px;
  border:1px solid var(--border2);border-radius:8px;
  font-size:12px;font-weight:500;font-family:inherit;
  color:var(--tx2);background:var(--surface);
  cursor:pointer;outline:none;
}
.fsel:hover{border-color:var(--tx3);}
.fsel:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1);}

/* ══ WARN BANNER ═════════════════════════════════════════════ */
.warn-banner{
  background:#fff7ed;border:1px solid #fed7aa;
  border-radius:var(--r);padding:12px 16px;margin-bottom:18px;
  display:flex;align-items:flex-start;gap:10px;
}
.warn-icon{width:20px;height:20px;flex-shrink:0;color:#ea580c;margin-top:1px;}
.warn-icon svg{width:20px;height:20px;}
.warn-text strong{font-size:13px;color:#9a3412;display:block;margin-bottom:2px;}
.warn-text p{font-size:12px;color:#c2410c;}

/* ══ EMPTY STATES ════════════════════════════════════════════ */
.empty{padding:52px 24px;text-align:center;}
.empty-icon{width:60px;height:60px;border-radius:16px;background:#f0f4f8;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.empty-icon svg{width:28px;height:28px;color:var(--tx3);}
.empty h4{font-size:15px;font-weight:600;color:var(--tx);margin-bottom:6px;}
.empty p{font-size:13px;color:var(--tx2);max-width:320px;margin:0 auto 18px;line-height:1.6;}

/* ══ FORMS / MODALS ══════════════════════════════════════════ */
.overlay{
  position:fixed;inset:0;background:rgba(15,22,41,.5);
  display:flex;align-items:center;justify-content:center;
  z-index:999;padding:20px;
  backdrop-filter:blur(2px);
}
.modal{
  background:var(--surface);border-radius:var(--r2);
  width:100%;max-width:560px;max-height:90vh;
  display:flex;flex-direction:column;
  box-shadow:var(--sh4);animation:modalIn .18s ease;
}

<body>
<div id="root"></div>
<script>
/* ════════════════════════════════════════════════════════════
   DATA & STATE
════════════════════════════════════════════════════════════ */
/* ── Firebase Config ── */
const FB_URL = 'https://qa-leads-tracker-default-rtdb.firebaseio.com/qa_meetings.json';
let S = {
  meetings:   [],
  currentId:  null,
  view:       'dashboard',
  tab:        'discussion',
  fStatus:    'all',
  fPriority:  'all'
};
let _saving = false;
let _lastRemoteUpdate = 0;

/* Show a toast notification */
function showToast(msg, type='success') {
  const t = document.createElement('div');
  const bg = type==='error' ? '#dc2626' : type==='info' ? '#2563eb' : '#059669';
  const icon = type==='error' ? '✕' : type==='info' ? '↻' : '✓';
  t.style.cssText = `position:fixed;bottom:24px;right:24px;background:${bg};color:#fff;padding:12px 18px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.25);max-width:320px;display:flex;align-items:center;gap:8px;`;
  t.innerHTML = `<span style="font-size:16px">${icon}</span><span>${msg}</span>`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

/* Sync indicator in header */
function setSyncStatus(status) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  if (status === 'saving') {
    el.innerHTML = '🔄 Saving…';
    el.style.color = '#93c5fd';
  } else if (status === 'saved') {
    el.innerHTML = '✓ Saved';
    el.style.color = '#86efac';
    setTimeout(() => { if(el) el.innerHTML = '● Live'; el.style.color='#86efac'; }, 2000);
  } else if (status === 'error') {
    el.innerHTML = '⚠ Offline';
    el.style.color = '#fca5a5';
  } else {
    el.innerHTML = '● Live';
    el.style.color = '#86efac';
  }
}

/* Firebase removes empty arrays on save — always restore them on load */
function normalizeMtg(m) {
  m.topics      = m.topics      || [];
  m.actionItems = m.actionItems || [];
  m.attendees   = m.attendees   || [];
  m.tables      = m.tables      || [];
  m.topics.forEach(t => { t.open = t.open !== false; });
  m.actionItems.forEach(a => {
    a.priority = a.priority || 'Medium';
    a.status   = a.status   || 'Open';
  });
  return m;
}

function load() {
  /* Render immediately so the app is usable right away */
  render();
  /* Then fetch latest data from Firebase in background */
  fetchFromFirebase();
  /* Auto-sync every 30 seconds */
  setInterval(fetchFromFirebase, 30000);
  /* Sync when user switches back to the tab */
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && !_saving) fetchFromFirebase();
  });
}

function fetchFromFirebase() {
  if (_saving) return;
  fetch(FB_URL)
    .then(r => r.json())
    .then(d => {
      if (!d || !d.meetings) return; /* empty database — nothing to load */
      const remote = d._updated || 0;
      if (remote > _lastRemoteUpdate) {
        _lastRemoteUpdate = remote;
        S.meetings = d.meetings.map(normalizeMtg);
        render();
        setSyncStatus('live');
      }
    })
    .catch(() => setSyncStatus('error'));
}

function persist() {
  _saving = true;
  setSyncStatus('saving');
  _lastRemoteUpdate = Date.now();
  fetch(FB_URL, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ meetings: S.meetings, _v: 3, _updated: _lastRemoteUpdate })
  })
  .then(() => { _saving = false; setSyncStatus('saved'); })
  .catch(() => {
    _saving = false;
    setSyncStatus('error');
    showToast('Could not save — check your internet connection.', 'error');
  });
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

/* ── Date helpers ── */
function lastFriday() {
  const d = new Date(), day = d.getDay();
  d.setDate(d.getDate() - (day >= 5 ? day-5 : day+2));
  return d.toISOString().split('T')[0];
}
function fmtDate(s) {
  if (!s) return '—';
  const [y,m,d] = s.split('-'), mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${mo[+m-1]} ${+d}, ${y}`;
}
function fmtShort(s) {
  if (!s) return '—';
  const [y,m,d] = s.split('-'), mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${mo[+m-1]} ${+d}`;
}
function today() { return new Date().toISOString().split('T')[0]; }
function isOD(due,status) { return due && status!=='Done' && due < today(); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function getMtg(id) {
  const m = S.meetings.find(m=>m.id===(id||S.currentId));
  if(!m) return undefined;
  return normalizeMtg(m);
}

/* ── Stats ── */
function stats() {
  const all = S.meetings.flatMap(m=>m.actionItems||[]);
  return {
    total:      S.meetings.length,
    open:       all.filter(a=>a.status==='Open').length,
    inprogress: all.filter(a=>a.status==='In Progress').length,
    done:       all.filter(a=>a.status==='Done').length,
    overdue:    all.filter(a=>isOD(a.dueDate,a.status)).length,
    allCount:   all.length
  };
}

/* ════════════════════════════════════════════════════════════
   CRUD
════════════════════════════════════════════════════════════ */
/* ── Table CRUD ── */
function createTable(mid, title, headers) {
  const m = getMtg(mid); if (!m) return;
  if (!m.tables) m.tables = [];
  m.tables.push({ id: uid(), title, headers, rows: [headers.map(() => '')] });
  persist(); render();
}
function addTableRow(mid, tid) {
  const m = getMtg(mid); if (!m) return;
  const t = m.tables.find(x => x.id === tid); if (!t) return;
  t.rows.push(t.headers.map(() => ''));
  persist(); render();
}
function updateTableCell(mid, tid, ri, ci, val) {
  const m = getMtg(mid); if (!m) return;
  const t = m.tables.find(x => x.id === tid); if (!t) return;
  t.rows[ri][ci] = val;
  persist();
}
function deleteTableRow(mid, tid, ri) {
  const m = getMtg(mid); if (!m) return;
  const t = m.tables.find(x => x.id === tid); if (!t) return;
  t.rows.splice(ri, 1);
  persist(); render();
}
function deleteTable(mid, tid) {
  const m = getMtg(mid); if (!m) return;
  if (!window.confirm('Delete this table?')) return;
  m.tables = m.tables.filter(x => x.id !== tid);
  persist(); render();
}

function createMtg(date) {
  const m = { id:uid(), date, attendees:[], topics:[], actionItems:[], tables:[], created:new Date().toISOString() };
  S.meetings.unshift(m);
  S.meetings.sort((a,b) => b.date.localeCompare(a.date));
  S.currentId=m.id; S.view='meeting'; S.tab='discussion'; S.fStatus='all'; S.fPriority='all';
  persist(); render();
}
function deleteMtg(id) {
  if (!window.confirm('Delete this meeting? All data will be permanently removed.')) return;
  S.meetings = S.meetings.filter(m=>m.id!==id);
  if (S.currentId===id) { S.currentId=null; S.view='dashboard'; }
  persist(); render();
}
function addTopic(mid,title,notes) {
  const m=getMtg(mid); if(!m) return;
  if(!m.topics) m.topics=[];
  m.topics.push({id:uid(),title,notes,open:true});
  persist(); render();
}
function editTopic(mid,tid,title,notes) {
  const t=getMtg(mid)?.topics.find(x=>x.id===tid);
  if(t){t.title=title;t.notes=notes;persist();render();}
}
function delTopic(mid,tid) {
  const m=getMtg(mid); if(!m) return;
  m.topics=m.topics.filter(t=>t.id!==tid); persist(); render();
}
function toggleTopic(mid,tid) {
  const t=getMtg(mid)?.topics.find(x=>x.id===tid);
  if(t){t.open=!t.open;render();}
}
function addAction(mid,item) {
  const m=getMtg(mid); if(!m) return;
  if(!m.actionItems) m.actionItems=[];
  m.actionItems.push({id:uid(),...item}); persist(); render();
}
function editAction(mid,aid,upd) {
  const m=getMtg(mid); if(!m) return;
  const i=m.actionItems.findIndex(a=>a.id===aid);
  if(i>=0) m.actionItems[i]={...m.actionItems[i],...upd};
  persist(); render();
}
function delAction(mid,aid) {
  const m=getMtg(mid); if(!m) return;
  m.actionItems=m.actionItems.filter(a=>a.id!==aid); persist(); render();
}
function addAttendee(mid,name) {
  const m=getMtg(mid); if(!m||!name.trim()) return;
  if(!m.attendees) m.attendees=[];
  if(!m.attendees.includes(name.trim())) { m.attendees.push(name.trim()); persist(); render(); }
}
function removeAttendee(mid,name) {
  const m=getMtg(mid); if(!m) return;
  m.attendees=m.attendees.filter(a=>a!==name); persist(); render();
}

/* ════════════════════════════════════════════════════════════
   IMPORT / EXPORT
════════════════════════════════════════════════════════════ */
function exportJSON() {
  const b=new Blob([JSON.stringify({meetings:S.meetings,exported:new Date().toISOString()},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(b);
  a.download='qa_meetings_'+today()+'.json'; a.click(); URL.revokeObjectURL(a.href);
}
function importJSON() {
  const i=document.createElement('input'); i.type='file'; i.accept='.json';
  i.onchange=e=>{
    const fr=new FileReader();
    fr.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(!d.meetings) throw 0;
        if(!window.confirm(`Import ${d.meetings.length} meeting(s)? Current data will be replaced.`)) return;
        S.meetings=d.meetings; S.currentId=null; S.view='dashboard';
        persist(); render(); showToast(`✓ Imported ${d.meetings.length} meeting(s) successfully.`);
      } catch{ showToast('Import failed — invalid file format.','error'); }
    };
    fr.readAsText(e.target.files[0]);
  };
  i.click();
}

/* ════════════════════════════════════════════════════════════
   SUMMARY BUILDER
════════════════════════════════════════════════════════════ */
function buildSummary(m) {
  const pad=(s,n)=>String(s).substring(0,n).padEnd(n);
  const L=[];
  L.push('╔══════════════════════════════════════════════════════╗');
  L.push('║          QA LEADS WEEKLY MEETING SUMMARY             ║');
  L.push('╠══════════════════════════════════════════════════════╣');
  L.push(`║  Date       : ${pad(fmtDate(m.date),37)}║`);
  L.push(`║  Attendees  : ${pad((m.attendees||[]).join(', ')||'—',37)}║`);
  const open=(m.actionItems||[]).filter(a=>a.status!=='Done').length;
  L.push(`║  Summary    : ${pad(`${(m.topics||[]).length} topics · ${(m.actionItems||[]).length} action items · ${open} pending`,37)}║`);
  L.push('╚══════════════════════════════════════════════════════╝');
  L.push('');

  if((m.topics||[]).length){
    L.push('┌─ DISCUSSION TOPICS ─────────────────────────────────┐');
    m.topics.forEach((t,i)=>{
      L.push(`│  ${i+1}. ${t.title}`);
      if(t.notes) htmlToPlainText(renderNotes(t.notes)).split('\n').filter(n=>n.trim()).forEach(n=>L.push(`│     ${n}`));
    });
    L.push('└──────────────────────────────────────────────────────┘');
    L.push('');
  }

  if((m.actionItems||[]).length){
    L.push('┌─ ACTION ITEMS ──────────────────────────────────────┐');
    const pend=(m.actionItems||[]).filter(a=>a.status!=='Done');
    const done=(m.actionItems||[]).filter(a=>a.status==='Done');
    const fmt=(a,i)=>{
      L.push(`│  ${i+1}. ${a.description}`);
      L.push(`│     Owner    : ${a.owner||'—'}`);
      L.push(`│     Due      : ${a.dueDate?fmtDate(a.dueDate):'—'}${isOD(a.dueDate,a.status)?' ⚠ OVERDUE':''}`);
      L.push(`│     Priority : ${a.priority||'—'}   Status : ${a.status||'—'}`);
      if(a.comment) L.push(`│     Note     : ${a.comment}`);
      L.push('│');
    };
    if(pend.length){ L.push('│  ▶ PENDING'); pend.forEach(fmt); }
    if(done.length){ L.push('│  ✓ COMPLETED'); done.forEach(fmt); }
    L.push('└──────────────────────────────────────────────────────┘');
  }
  return L.join('\n');
}

/* ════════════════════════════════════════════════════════════
   MODAL HELPER
════════════════════════════════════════════════════════════ */
/* Global modal state — most reliable approach for iframe/Teams */
window._modalSaveFn = null;

function closeModal() {
  const ov = document.getElementById('modal-overlay');
  if(ov) ov.remove();
  window._modalSaveFn = null;
}

function doModalSave() {
  const ov = document.getElementById('modal-overlay');
  if(!ov || !window._modalSaveFn) return;
  try {
    const result = window._modalSaveFn(ov);
    if(result === true) closeModal();
  } catch(err) {
    showToast('Error: ' + (err.message||'Please try again.'), 'error');
  }
}

/* ── Rich-text editor helpers ──────────────────────────────────────── */
function sanitizeRichHtml(raw) {
  const tmp = document.createElement('div');
  tmp.innerHTML = raw;
  // Remove dangerous / invisible tags
  tmp.querySelectorAll('script,style,meta,link,object,embed,iframe,head').forEach(el=>el.remove());
  tmp.querySelectorAll('*').forEach(el => {
    // Strip event handlers and class names (keep colspan/rowspan)
    Array.from(el.attributes).forEach(attr => {
      const n = attr.name.toLowerCase();
      if (n.startsWith('on') || n==='class') el.removeAttribute(n);
      // Strip all inline styles except on table cells (keep nothing — let our CSS handle it)
      if (n==='style') el.removeAttribute(n);
    });
    // Remove Word/Office conditional comment wrappers left as empty spans
    if (el.tagName==='SPAN' && !el.textContent.trim() && !el.querySelector('img,table')) el.remove();
  });
  // Remove empty paragraphs at start/end
  return tmp.innerHTML;
}

function htmlToPlainText(html) {
  if (!html) return '';
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  // Flatten table rows to pipe-separated text
  tmp.querySelectorAll('tr').forEach(tr => {
    const cells = Array.from(tr.querySelectorAll('td,th')).map(c=>c.textContent.trim());
    const line = document.createTextNode(cells.join(' | ') + '\n');
    tr.replaceWith(line);
  });
  tmp.querySelectorAll('table').forEach(t => { const br = document.createTextNode('\n'); t.replaceWith(br); });
  tmp.querySelectorAll('br').forEach(br => br.replaceWith('\n'));
  tmp.querySelectorAll('p,div,li').forEach(el => { el.after(document.createTextNode('\n')); });
  return tmp.textContent.replace(/\n{3,}/g, '\n\n').trim();
}

function renderNotes(notes) {
  if (!notes) return '';
  // Detect if stored as HTML (has tags) or legacy plain text
  if (/<[a-zA-Z]/.test(notes)) return sanitizeRichHtml(notes);
  // Legacy plain text — escape and convert newlines to <br>
  return notes.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function setupRichEditor(el) {
  // Populate from data-notes attribute (for edit modals)
  const stored = el.dataset.notes;
  if (stored !== undefined) el.innerHTML = renderNotes(stored);

  el.addEventListener('paste', e => {
    e.preventDefault();
    const html  = e.clipboardData.getData('text/html');
    const plain = e.clipboardData.getData('text/plain');
    if (html && html.includes('<table')) {
      // Paste contains a table — clean and insert as rich HTML
      document.execCommand('insertHTML', false, sanitizeRichHtml(html));
    } else if (html) {
      // Rich text without table — sanitize and insert
      document.execCommand('insertHTML', false, sanitizeRichHtml(html));
    } else {
      // Plain text fallback
      document.execCommand('insertText', false, plain);
    }
  });
}

function modal(html, onSave) {
  closeModal(); /* remove any existing modal */
  window._modalSaveFn = onSave;
  const wrap = document.createElement('div');
  wrap.className = 'overlay';
  wrap.id = 'modal-overlay';
  /* Replace m-save button onclick with global doModalSave */
  const modifiedHtml = html
    .replace(/class="btn btn-primary m-save"/g, 'class="btn btn-primary m-save" onclick="doModalSave()"')
    .replace(/class="ibtn m-close"/g, 'class="ibtn m-close" onclick="closeModal()"')
    .replace(/class="btn btn-secondary m-cancel"/g, 'class="btn btn-secondary m-cancel" onclick="closeModal()"');
  wrap.innerHTML = modifiedHtml;
  /* click on dark backdrop closes modal */
  wrap.addEventListener('click', e=>{ if(e.target===wrap) closeModal(); });
  document.body.appendChild(wrap);
  setTimeout(()=>{
    wrap.querySelectorAll('.rich-editor').forEach(setupRichEditor);
    (wrap.querySelector('input,textarea,select,[contenteditable]'))?.focus();
  }, 80);
}

/* Teams-safe validation — shows error inside the form */
function formError(wrap, msg) {
  let err = wrap.querySelector('.form-error');
  if(!err){
    err = document.createElement('div');
    err.className = 'form-error';
    err.style.cssText = 'background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;font-size:13px;font-weight:600;margin-bottom:12px;';
    const body = wrap.querySelector('.modal-body');
    if(body) body.insertBefore(err, body.firstChild);
  }
  err.textContent = '⚠ ' + msg;
  return false;
}

/* ── SVG Icons ── */
const ico = {

  chat:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>`,

function showNewMtg() {
  modal(`<div class="modal">
    <div class="modal-hdr">

      <button class="ibtn m-close">${ico.plus.replace('line x1="12" y1="5" x2="12" y2="19"','line x1="18" y1="6" x2="6" y2="18"').replace('line x1="5" y1="12" x2="19" y2="12"','line x1="6" y1="6" x2="18" y2="18"')}</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Meeting Date <span>(defaults to last Friday)</span></label>
        <input class="field" type="date" id="nd" value="${lastFriday()}">
      </div>
      <p style="font-size:12px;color:#8da0bc;background:#f7f9fc;padding:10px 12px;border-radius:8px;border:1px solid #e4e9f0">

      </p>

}

/* ════════════════════════════════════════════════════════════
   RENDER ENGINE
════════════════════════════════════════════════════════════ */
function render() {
  const st = stats();
  const allAtts = [...new Set(S.meetings.flatMap(m=>m.attendees||[]))];

  document.getElementById('root').innerHTML = `
  <header>
    <div class="hdr-brand">
      <div class="hdr-brand-icon">${ico.clipbrd}</div>
      <div class="hdr-title">
        <h1>QA Leads Meeting Tracker</h1>
        <p>Weekly discussion & action item management</p>
      </div>
    </div>
    <div class="hdr-right">
      <span id="sync-status" style="font-size:11px;font-weight:600;color:#86efac;letter-spacing:.02em;">● Live</span>
      <div class="separator"></div>
      <button class="hbtn hbtn-ghost" onclick="importJSON()">${ico.upload} Import</button>
      <button class="hbtn hbtn-ghost" onclick="exportJSON()">${ico.download} Export</button>
      <div class="separator"></div>
      <button class="hbtn hbtn-solid" onclick="showNewMtg()">${ico.plus} New Meeting</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="sb-hdr">
        <div class="sb-section-lbl">Meetings</div>
        <button class="sb-new" onclick="showNewMtg()">${ico.plus} New Friday Meeting</button>
      </div>
      <div class="sb-list">
        ${S.meetings.length===0
          ? `<div style="padding:24px 14px;text-align:center;font-size:12px;color:#4b5a72">No meetings yet.<br>Create your first one.</div>`
          : S.meetings.map(m=>{
              const oc=(m.actionItems||[]).filter(a=>a.status!=='Done').length;
              const tot=(m.actionItems||[]).length;
              const od=(m.actionItems||[]).filter(a=>isOD(a.dueDate,a.status)).length;
              const pct=tot>0?Math.round((tot-oc)/tot*100):0;
              const isAct=m.id===S.currentId;
              return `<div class="sb-item${isAct?' active':''}" onclick="selectMtg('${m.id}')">
                <div class="sb-item-date">${fmtDate(m.date)}</div>
                <div class="sb-item-title">Week of ${fmtShort(m.date)}</div>
                <div class="sb-item-foot">
                  <div class="sb-chips">
                    ${(m.topics||[]).length?`<span class="sb-chip sc-t">${m.topics.length} topics</span>`:''}
                    ${od>0?`<span class="sb-chip sc-r">⚠ ${od}</span>`:''}
                    ${oc>0&&!od?`<span class="sb-chip sc-o">${oc} open</span>`:''}
                    ${tot>0&&oc===0?`<span class="sb-chip sc-d">✓ done</span>`:''}
                  </div>
                  ${tot>0?`<div class="sb-prog"><div class="sb-prog-fill" style="width:${pct}%"></div></div>`:''}
                </div>
              </div>`;
            }).join('')}
      </div>
      <div class="sb-footer"><p>Data saved locally in browser</p></div>
    </aside>

    <main class="main" id="main-area">
      ${S.view==='dashboard' ? renderDash(st) : renderMtgView(allAtts)}
    </main>
  </div>`;

  /* Wire attendee input */
  const attIn=document.getElementById('att-in');
  const attBtn=document.getElementById('att-btn');
  if(attBtn){
    attBtn.onclick=()=>{ addAttendee(S.currentId,attIn.value); attIn.value=''; };
    attIn.onkeydown=e=>{ if(e.key==='Enter') attBtn.click(); };
  }
  /* Wire copy-summary */
  document.getElementById('copy-btn')?.addEventListener('click',function(){
    const txt=document.getElementById('summary-text')?.innerText;
    if(!txt) return;
    navigator.clipboard.writeText(txt).then(()=>{
      const btn=document.getElementById('copy-btn');
      const orig=btn.innerHTML;
      btn.innerHTML='✓ Copied! Now paste in Teams';
      btn.style.background='var(--green)';
      btn.style.borderColor='var(--green)';
      setTimeout(()=>{ btn.innerHTML=orig; btn.style.background=''; btn.style.borderColor=''; },3000);
    }).catch(()=>{
      /* fallback for browsers that block clipboard */
      const ta=document.createElement('textarea');
      ta.value=txt; ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
      showToast('✓ Copied! Go to Teams and paste (Ctrl+V / Cmd+V).');
    });
  });
}

function renderDash(st) {
  const overdueAll=S.meetings.flatMap(m=>
    (m.actionItems||[]).filter(a=>isOD(a.dueDate,a.status))
      .map(a=>({...a,mtgDate:m.date,mtgId:m.id}))
  );

  return `
  <div class="page-hdr">
    <div class="page-hdr-left">
      <h2>Dashboard</h2>
      <p>Overview of all QA leads meetings and action items</p>

    <div class="page-hdr-right">
      <button class="btn btn-primary" onclick="showNewMtg()">${ico.plus} New Meeting</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat stat-blue">
      <div class="stat-icon si-blue">${ico.calendar}</div>
      <div class="stat-val">${st.total}</div>
      <div class="stat-lbl">Meetings Recorded</div>
    </div>
    <div class="stat stat-amber">
      <div class="stat-icon si-amber">${ico.clock}</div>
      <div class="stat-val">${st.open}</div>
      <div class="stat-lbl">Open Action Items</div>

      <div class="stat-icon si-indigo">${ico.list}</div>

      <div class="stat-lbl">In Progress</div>
    </div>
    <div class="stat stat-red">
      <div class="stat-icon si-red">${ico.alert}</div>
      <div class="stat-val">${st.overdue}</div>
      <div class="stat-lbl">Overdue Items</div>
    </div>
  </div>

  ${overdueAll.length?`
  <div class="warn-banner">
    <div class="warn-icon">${ico.alert}</div>
    <div class="warn-text">
      <strong>⚠ ${overdueAll.length} overdue action item${overdueAll.length>1?'s':''} need attention</strong>
      <p>These items are past their due date and still not marked as Done.</p>
    </div>
  </div>
  <div class="card">
    <div class="card-hdr">
      <div class="card-hdr-left">
        <div class="card-hdr-icon chi-red">${ico.alert}</div>
        <h3 style="color:#dc2626">Overdue Action Items</h3>
      </div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Description</th><th>Owner</th><th>Due Date</th><th>Priority</th><th>From Meeting</th></tr></thead>
        <tbody>
          ${overdueAll.map(a=>`<tr style="cursor:pointer" onclick="selectMtg('${a.mtgId}')">
            <td class="td-main">${esc(a.description)}</td>
            <td>${esc(a.owner||'—')}</td>
            <td class="overdue-txt">${fmtDate(a.dueDate)}</td>
            <td><span class="badge p-${(a.priority||'').toLowerCase()}">${a.priority||'—'}</span></td>
            <td style="color:var(--tx3)">${fmtDate(a.mtgDate)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`:''}

  <div class="card">
    <div class="card-hdr">
      <div class="card-hdr-left">
        <div class="card-hdr-icon chi-blue">${ico.calendar}</div>
        <h3>All Meetings</h3>
      </div>
    </div>
    ${S.meetings.length===0?`
    <div class="empty">
      <div class="empty-icon">${ico.calendar}</div>
      <h4>No meetings recorded yet</h4>
      <p>Create your first Friday meeting to start capturing discussion topics and action items.</p>
      <button class="btn btn-primary" onclick="showNewMtg()">${ico.plus} Create First Meeting</button>
    </div>`:`
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Date</th><th>Attendees</th><th>Topics</th><th>Items</th><th>Progress</th><th>Overdue</th><th></th></tr></thead>
        <tbody>
          ${S.meetings.map(m=>{
            const oc=(m.actionItems||[]).filter(a=>a.status!=='Done').length;
            const tot=(m.actionItems||[]).length;
            const od=(m.actionItems||[]).filter(a=>isOD(a.dueDate,a.status)).length;
            const pct=tot>0?Math.round((tot-oc)/tot*100):0;
            const attShow=(m.attendees||[]).length>0
              ?m.attendees.slice(0,3).join(', ')+(m.attendees.length>3?` +${m.attendees.length-3}`:'')
              :'<span style="color:var(--tx3)">—</span>';
            return `<tr style="cursor:pointer" onclick="selectMtg('${m.id}')">
              <td class="td-main" style="white-space:nowrap">${fmtDate(m.date)}</td>
              <td style="color:var(--tx2)">${attShow}</td>
              <td style="text-align:center">${(m.topics||[]).length}</td>
              <td style="text-align:center">${tot}</td>
              <td style="min-width:120px">
                ${tot>0?`<div style="display:flex;align-items:center;gap:8px">
                  <div style="flex:1;height:5px;background:#e9f0fa;border-radius:10px;overflow:hidden">
                    <div style="height:100%;width:${pct}%;background:${pct===100?'#059669':'#2563eb'};border-radius:10px"></div>
                  </div>
                  <span style="font-size:11px;font-weight:600;color:${pct===100?'#059669':'var(--tx2)'};min-width:28px">${pct}%</span>
                </div>`:`<span style="color:var(--tx3);font-size:12px">—</span>`}
              </td>
              <td>${od>0?`<span class="badge" style="background:#fee2e2;color:#b91c1c">⚠ ${od} overdue</span>`:`<span style="color:var(--tx3);font-size:12px">—</span>`}</td>
              <td><button class="ibtn del" title="Delete" onclick="event.stopPropagation();deleteMtg('${m.id}')">${ico.trash}</button></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`}
  </div>`;
}

/* ════════════════════════════════════════════════════════════
   MEETING VIEW
════════════════════════════════════════════════════════════ */
function renderMtgView(allAtts) {
  const m=getMtg();
  if(!m) return `<div class="empty"><div class="empty-icon">${ico.clipbrd}</div><h4>Select a meeting</h4><p>Choose a meeting from the sidebar to view its details.</p></div>`;

  const tot=(m.actionItems||[]).length;
  const oc=(m.actionItems||[]).filter(a=>a.status!=='Done').length;
  const od=(m.actionItems||[]).filter(a=>isOD(a.dueDate,a.status)).length;
  const pct=tot>0?Math.round((tot-oc)/tot*100):0;

  return `
  <div class="page-hdr">
    <div class="page-hdr-left">
      <h2>Meeting Detail</h2>
      <p>${fmtDate(m.date)} &nbsp;·&nbsp; ${(m.topics||[]).length} topics &nbsp;·&nbsp; ${tot} action items</p>
    </div>
    <div class="page-hdr-right">
      <button class="btn btn-secondary" onclick="S.currentId=null;S.view='dashboard';render()">${ico.grid} Dashboard</button>
    </div>
  </div>

  <div class="mtg-hero">
    <div class="mtg-hero-top">
      <div style="flex:1">
        <div class="mtg-badge">${ico.calendar} ${fmtDate(m.date)}</div>
        <div class="mtg-title">QA Leads Weekly Meeting</div>
        <div class="mtg-meta">
          <span>${ico.users.replace('stroke-width="2"','width="14" height="14" style="display:inline;vertical-align:-2px"')} ${(m.attendees||[]).length} attendees</span>
          <span class="mtg-meta-dot"></span>
          <span>${(m.topics||[]).length} topics discussed</span>
          <span class="mtg-meta-dot"></span>
          <span>${oc} pending items</span>
          ${od>0?`<span class="mtg-meta-dot"></span><span style="color:var(--red);font-weight:600">⚠ ${od} overdue</span>`:''}
        </div>
        <div class="att-section">
          <div class="att-label">${ico.users.replace('viewBox','width="12" height="12" style="display:inline;vertical-align:-1px;margin-right:4px" viewBox')} Attendees</div>
          <div class="att-row">
            ${(m.attendees||[]).map(a=>`<span class="att-chip">${esc(a)}<span class="att-rm" onclick="removeAttendee('${m.id}','${esc(a)}')">×</span></span>`).join('')}
            <div class="att-input-wrap">
              <input id="att-in" type="text" placeholder="Add lead name…" list="att-dl">
              <datalist id="att-dl">${allAtts.map(a=>`<option>${esc(a)}</option>`).join('')}</datalist>
              <button class="att-add-btn" id="att-btn">Add</button>
            </div>
          </div>
        </div>
      </div>
      <div class="mtg-hero-actions">
        <button class="btn btn-primary" onclick="setTab('summary')">${ico.doc} Generate Summary</button>
        <button class="btn btn-ghost-red" onclick="deleteMtg('${m.id}')">${ico.trash} Delete</button>
      </div>
    </div>
    ${tot>0?`<div class="progress-wrap">
      <div class="progress-row">
        <span class="progress-label">Action Items Progress</span>
        <span class="progress-pct">${pct}% complete</span>
      </div>
      <div class="progress-bar"><div class="progress-fill${pct===100?' done':''}" style="width:${pct}%"></div></div>
    </div>`:''}
  </div>

  <div class="tabs">
    <div class="tab${S.tab==='discussion'?' active':''}" onclick="setTab('discussion')">
      ${ico.chat} Discussion Topics <span class="tab-count">${(m.topics||[]).length}</span>
    </div>
    <div class="tab${S.tab==='actions'?' active':''}" onclick="setTab('actions')">
      ${ico.check} Action Items <span class="tab-count">${tot}</span>
    </div>
    <div class="tab${S.tab==='tables'?' active':''}" onclick="setTab('tables')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
      Tables <span class="tab-count">${(m.tables||[]).length}</span>
    </div>
    <div class="tab${S.tab==='summary'?' active':''}" onclick="setTab('summary')">
      ${ico.doc} Summary
    </div>
  </div>

  ${S.tab==='discussion' ? renderTopics(m)
  : S.tab==='actions'    ? renderActions(m)
  : S.tab==='tables'     ? renderTables(m)
  :                        renderSummary(m)}`;
}

/* ════════════════════════════════════════════════════════════
   DISCUSSION TAB
════════════════════════════════════════════════════════════ */
function renderTopics(m) {
  return `
  <div style="display:flex;justify-content:flex-end;margin-bottom:14px">
    <button class="btn btn-primary" onclick="showAddTopic('${m.id}')">${ico.plus} Add Topic</button>
  </div>
  ${!(m.topics||[]).length?`<div class="card"><div class="empty">
    <div class="empty-icon">${ico.chat}</div>
    <h4>No discussion topics yet</h4>
    <p>Add the agenda items that were discussed during this meeting. Include notes and key decisions.</p>
    <button class="btn btn-primary" onclick="showAddTopic('${m.id}')">${ico.plus} Add First Topic</button>
  </div></div>`
  : m.topics.map((t,i)=>`
  <div class="topic-card">
    <div class="topic-hdr${t.open!==false?' open-state':''}" onclick="toggleTopic('${m.id}','${t.id}')">
      <div class="topic-num">${i+1}</div>
      <div class="topic-name">${esc(t.title)}</div>
      <div class="topic-btns">
        <button class="ibtn" title="Edit" onclick="event.stopPropagation();showEditTopic('${m.id}','${t.id}')">${ico.edit}</button>
        <button class="ibtn del" title="Delete" onclick="event.stopPropagation();delTopic('${m.id}','${t.id}')">${ico.trash}</button>
      </div>
      <div class="topic-chevron${t.open!==false?' open':''}">${ico.chevron}</div>
    </div>
    ${t.open!==false?`<div class="topic-body">
      ${t.notes
        ?`<div class="topic-notes">${renderNotes(t.notes)}</div>`
        :`<div class="topic-empty">No notes added yet. Click the edit button to add meeting notes for this topic.</div>`}
    </div>`:''}
  </div>`).join('')}`;
}

/* ════════════════════════════════════════════════════════════
   ACTION ITEMS TAB
════════════════════════════════════════════════════════════ */
function renderActions(m) {
  let items=[...(m.actionItems||[])];
  if(S.fStatus!=='all') items=items.filter(a=>a.status===S.fStatus);
  if(S.fPriority!=='all') items=items.filter(a=>a.priority===S.fPriority);

  const pBadge=p=>`<span class="badge p-${(p||'').toLowerCase()}">${p||'—'}</span>`;
  const sBadge=s=>{
    const c=s==='Open'?'s-open':s==='In Progress'?'s-inprogress':'s-done';
    const dot=s==='Open'?'#d97706':s==='In Progress'?'#2563eb':'#059669';
    return `<span class="badge ${c}"><span class="badge-dot" style="background:${dot}"></span>${s||'—'}</span>`;
  };

  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">
    <div class="filter-bar">
      <select class="fsel" onchange="S.fStatus=this.value;render()">
        <option value="all"${S.fStatus==='all'?' selected':''}>All Status</option>
        <option value="Open"${S.fStatus==='Open'?' selected':''}>Open</option>
        <option value="In Progress"${S.fStatus==='In Progress'?' selected':''}>In Progress</option>
        <option value="Done"${S.fStatus==='Done'?' selected':''}>Done</option>
      </select>
      <select class="fsel" onchange="S.fPriority=this.value;render()">
        <option value="all"${S.fPriority==='all'?' selected':''}>All Priority</option>
        <option value="High"${S.fPriority==='High'?' selected':''}>🔴 High</option>
        <option value="Medium"${S.fPriority==='Medium'?' selected':''}>🟡 Medium</option>
        <option value="Low"${S.fPriority==='Low'?' selected':''}>🟢 Low</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="showAddAction('${m.id}')">${ico.plus} Add Action Item</button>
  </div>

  ${items.length===0?`<div class="card"><div class="empty">
    <div class="empty-icon">${(m.actionItems||[]).length===0?ico.check:ico.list}</div>
    <h4>${(m.actionItems||[]).length===0?'No action items yet':'No items match the filters'}</h4>
    <p>${(m.actionItems||[]).length===0
      ?'Capture any tasks, follow-ups, or decisions that need action after this meeting.'
      :'Try adjusting the status or priority filters above.'}</p>
    ${(m.actionItems||[]).length===0?`<button class="btn btn-primary" onclick="showAddAction('${m.id}')">${ico.plus} Add First Item</button>`:''}
  </div></div>`
  :`<div class="card"><div class="tbl-wrap"><table>
    <thead><tr>
      <th style="width:30px">#</th>
      <th>Description</th>
      <th>Owner</th>
      <th>Due Date</th>
      <th>Priority</th>
      <th>Status</th>
      <th style="max-width:160px">Comment</th>
      <th style="width:72px"></th>
    </tr></thead>
    <tbody>
      ${items.map((a,i)=>{
        const od=isOD(a.dueDate,a.status);
        return `<tr>
          <td style="color:var(--tx3);font-weight:600;font-size:12px">${i+1}</td>
          <td class="td-main" style="max-width:220px">${esc(a.description)}</td>
          <td style="white-space:nowrap">${a.owner?`<span style="display:inline-flex;align-items:center;gap:5px">
            <span style="width:22px;height:22px;border-radius:50%;background:#e8efff;color:#3346a0;font-size:9px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0">${esc(a.owner).substring(0,2).toUpperCase()}</span>
            ${esc(a.owner)}</span>`:`<span style="color:var(--tx3)">—</span>`}</td>
          <td style="white-space:nowrap" class="${od?'overdue-txt':''}">${a.dueDate?fmtDate(a.dueDate)+(od?' ⚠':''):`<span style="color:var(--tx3)">—</span>`}</td>
          <td>${pBadge(a.priority)}</td>
          <td>${sBadge(a.status)}</td>
          <td style="color:var(--tx3);font-size:12px;max-width:160px">${a.comment?esc(a.comment):`<span style="color:#d0d9e6">—</span>`}</td>
          <td style="white-space:nowrap">
            <button class="ibtn" title="Edit" onclick="showEditAction('${m.id}','${a.id}')">${ico.edit}</button>
            <button class="ibtn del" title="Delete" onclick="delAction('${m.id}','${a.id}')">${ico.trash}</button>
          </td>
        </tr>`;
      }).join('')}
    </tbody>
  </table></div></div>`}`;
}

/* ════════════════════════════════════════════════════════════
   SUMMARY TAB
════════════════════════════════════════════════════════════ */
/* ════════════════════════════════════════════════════════════
   TABLES TAB
════════════════════════════════════════════════════════════ */
function renderTables(m) {
  const tables = m.tables || [];
  return `
  <div style="display:flex;justify-content:flex-end;margin-bottom:14px">
    <button class="btn btn-primary" onclick="showCreateTable('${m.id}')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Create Table
    </button>
  </div>
  ${!tables.length ? `<div class="card"><div class="empty">
    <div class="empty-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg></div>
    <h4>No tables yet</h4>
    <p>Click "Create Table" to add a custom table with your own columns.</p>
    <button class="btn btn-primary" onclick="showCreateTable('${m.id}')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Create Table
    </button>
  </div></div>` :
  tables.map(t => `
  <div class="card" style="margin-bottom:18px">
    <div class="card-hdr">
      <div class="card-hdr-left">
        <div class="card-hdr-icon" style="background:#ede9fe">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
        </div>
        <div><h3>${esc(t.title)}</h3><p style="font-size:12px;color:var(--tx2)">${t.rows.length} row${t.rows.length!==1?'s':''} · ${t.headers.length} column${t.headers.length!==1?'s':''}</p></div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" onclick="addTableRow('${m.id}','${t.id}')">+ Add Row</button>
        <button class="ibtn" style="color:var(--red)" onclick="deleteTable('${m.id}','${t.id}')" title="Delete table">${ico.trash}</button>
      </div>
    </div>
    <div class="card-body" style="padding:0">
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead>
            <tr>
              ${t.headers.map(h=>`<th style="background:#1e3a8a;color:#fff;padding:10px 12px;text-align:left;font-weight:600;white-space:nowrap;border-right:1px solid rgba(255,255,255,.15)">${esc(h)}</th>`).join('')}
              <th style="background:#1e3a8a;width:36px;border:none"></th>
            </tr>
          </thead>
          <tbody>
            ${t.rows.map((row,ri)=>`
            <tr style="border-bottom:1px solid var(--border);${ri%2===0?'background:#f8fafc':'background:#fff'}">
              ${row.map((cell,ci)=>`
              <td style="padding:6px 8px;border-right:1px solid var(--border)">
                <input type="text" value="${esc(cell)}"
                  style="width:100%;border:none;background:transparent;font-size:13px;color:var(--tx);padding:4px 6px;border-radius:4px;outline:none"
                  onfocus="this.style.background='#eff6ff';this.style.outline='2px solid #2563eb'"
                  onblur="this.style.background='transparent';this.style.outline='none';updateTableCell('${m.id}','${t.id}',${ri},${ci},this.value)"
                  onkeydown="if(event.key==='Enter')this.blur()"
                  placeholder="—">
              </td>`).join('')}
              <td style="padding:4px;text-align:center">
                <button class="ibtn" style="color:var(--red);width:24px;height:24px;font-size:14px" onclick="deleteTableRow('${m.id}','${t.id}',${ri})" title="Delete row">×</button>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>`).join('')}`;
}

function showCreateTable(mid) {
  modal(`<div class="modal">
    <div class="modal-hdr">
      <div class="modal-hdr-left">
        <div class="modal-hdr-icon" style="background:#ede9fe">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
        </div>
        <h3>Create Table</h3>
      </div>
      <button class="ibtn m-close">${ico.plus.replace('line x1="12" y1="5" x2="12" y2="19"','line x1="18" y1="6" x2="6" y2="18"').replace('line x1="5" y1="12" x2="19" y2="12"','line x1="6" y1="6" x2="18" y2="18"')}</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Table Name</label>
        <input class="field" id="tbl-name" placeholder="e.g. Test Cases, Bug Tracker, Status Report…">
      </div>
      <div class="form-group">
        <label class="form-label">Number of Columns</label>
        <select class="field" id="tbl-cols" onchange="updateColInputs()">
          <option value="2">2 Columns</option>
          <option value="3" selected>3 Columns</option>
          <option value="4">4 Columns</option>
          <option value="5">5 Columns</option>
          <option value="6">6 Columns</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Column Headers</label>
        <div id="col-inputs" style="display:flex;flex-direction:column;gap:8px">
          <input class="field col-hdr" placeholder="Column 1 name">
          <input class="field col-hdr" placeholder="Column 2 name">
          <input class="field col-hdr" placeholder="Column 3 name">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary m-cancel">Cancel</button>
      <button class="btn btn-primary m-save">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Create Table
      </button>
    </div>
  </div>`, wrap => {
    const name = wrap.querySelector('#tbl-name').value.trim();
    if (!name) { return formError(wrap,'Please enter a table name.'); }
    const hdrs = [...wrap.querySelectorAll('.col-hdr')].map((el,i) => el.value.trim() || `Column ${i+1}`);
    createTable(mid, name, hdrs);
    return true;
  });
}

function updateColInputs() {
  const n = parseInt(document.getElementById('tbl-cols').value);
  const existing = [...document.querySelectorAll('.col-hdr')].map(el => el.value);
  const container = document.getElementById('col-inputs');
  container.innerHTML = Array.from({length:n},(_,i)=>
    `<input class="field col-hdr" placeholder="Column ${i+1} name" value="${esc(existing[i]||'')}">`
  ).join('');
}

function renderSummary(m) {
  const txt=buildSummary(m);
  const mtgDate=m.date?fmtDate(m.date):'Friday Meeting';
  const subject=encodeURIComponent(`QA Leads Meeting Summary — ${mtgDate}`);
  const body=encodeURIComponent(txt+'\n\nRegards,\nQA Project Manager — Cognizant');
  const mailtoLink=`mailto:?subject=${subject}&body=${body}`;
  return `
  <div class="card">
    <div class="card-hdr">
      <div class="card-hdr-left">
        <div class="card-hdr-icon chi-blue">${ico.doc}</div>
        <div>
          <h3>Meeting Summary</h3>
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button id="copy-btn" class="btn btn-primary" title="Copy summary to clipboard — then paste in Teams channel">
          ${ico.copy} Copy &amp; Post to Teams
        </button>
        <button class="btn btn-secondary" style="background:#0078d4;color:#fff;border-color:#0078d4;" onclick="window.location.href='${mailtoLink}'" title="Open Outlook with summary pre-filled — just hit Send">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          Email to Leads
        </button>
        <button class="btn btn-secondary" onclick="window.print()">${ico.print} Print</button>
      </div>
    </div>
    <div class="card-body">
      <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
        <div style="flex:1;min-width:220px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start;">
          <span style="font-size:18px;margin-top:1px;">📋</span>
          <div>
            <div style="font-size:12px;font-weight:700;color:#1d4ed8;margin-bottom:2px;">Copy &amp; Post to Teams</div>
            <div style="font-size:12px;color:#3b5998;">Copies the summary to clipboard. Switch to Teams, open the QA Leads channel, paste and send.</div>
          </div>
        </div>
        <div style="flex:1;min-width:220px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start;">
          <span style="font-size:18px;margin-top:1px;">📧</span>
          <div>
            <div style="font-size:12px;font-weight:700;color:#0078d4;margin-bottom:2px;">Email to Leads</div>
            <div style="font-size:12px;color:#3b5998;">Opens Outlook with the summary pre-filled. Add your leads' email addresses and hit Send.</div>
          </div>
        </div>
      </div>
      <div class="summary-outer">
        <div class="summary-box" id="summary-text">${esc(txt)}</div>
      </div>
    </div>
  </div>`;
}

/* ── Navigation ── */
function selectMtg(id) { S.currentId=id; S.view='meeting'; S.tab='discussion'; S.fStatus='all'; S.fPriority='all'; render(); }
function setTab(t) { S.tab=t; render(); }

   BOOT
════════════════════════════════════════════════════════════ */
